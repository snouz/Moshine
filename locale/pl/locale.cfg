[technology-description]
planet-discovery-moshine=Bardzo słoneczna planeta, bogata w neodym, krzem i energię słoneczną. Niektóre tajemnicze rozbite sondy zawierają bogatą wiedzę, którą moglibyśmy wykorzystać do poszerzenia granic sztucznej inteligencji.
moshine-concrete-from-molten-iron-and-sand=Wytwarzaj beton ze stopionego żelaza i piasku
moshine-petroleum-from-sand-sulfur-steam-carbon=Wytwarzaj gaz ziemny z piasku, siarki i węgla
moshine-tech-silicon=Pozwala przekształcić piasek w krzem.
moshine-tech-glass=Wytapianie piasku tworzy szkło.
moshine-tech-silicon-cell=Ogniwa krzemowe są niezbędnymi elementami komputerów.
moshine-tech-silicon-carbide=Węglik krzemu jest stosowany jako silny izolator.
moshine-tech-magnet=Przetwarzaj neodym i żelazo w potężne magnesy.
moshine-tech-datacell-empty=Umożliwia przetwarzanie i przechowywanie danych w komórkach.
moshine-tech-data-processor-building=Procesor danych przekształca dane i obsługuje zadania związane z danymi.
moshine-tech-neural_computer=Komputer neuronowy odkrywa nową wiedzę poprzez przetwarzanie ogromnych ilości informacji.
moshine-tech-data-extractor=Umożliwia odzyskiwanie danych z uszkodzonych sond na Moshine.
moshine-tech-3d-data-storage=Rdzenie holograficzne to optymalny sposób na przechowywanie złożonego modelu sztucznej inteligencji, a później na jego szkolenie.
moshine-tech-data-processor=Pozwala tworzyć złożoną sztuczną inteligencję, ale uwaga: jej pierwsza forma jest wybuchowa.
moshine-tech-ai-trainer=Modele AI można optymalizować poprzez uczenie się od siebie samych, aby następnie osiągnąć niespotykane dotąd poziomy badań.
moshine-tech-ai-tier=Szkolenie rdzeni sztucznej inteligencji o wykładniczo większej mocy.
moshine-tech-processing-grid=Przetwarzanie niezwykle złożonych operacji.
tech-space-trains=Pociągi magnetyczne o większej ładowności i prędkości ekspresowej.
minimalist-rails=Bardziej wytrzymałe szyny przewodzące energię, wykonane z minerałów z Moshine.
minimalist-elevated-rails=Wersja podwyższona szyn neodymowych.

