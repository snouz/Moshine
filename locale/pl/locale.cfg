[tips-and-tricks-item-description]
moshine-briefing=[planet=moshine] to gorąca planeta wulkaniczna, bogata w [item=sand] (który odblokowuje [item=silicon] i [item=glass]) oraz [item=neodymium] (dobra podstawa do produkcji [item=magnet]). Jest tak gorąco, że trudno zbudować [entity=accumulator], ale na szczęście wszędzie można znaleźć gorące [entity=steam-geyser]. Zaleca się zabranie przynajmniej [entity=foundry] aby móc przetwarzać [fluid=molten-iron] z żelaznych jezior. Wytwarzaj [fluid=crude-oil] poprzez upłynnianie węgla.
